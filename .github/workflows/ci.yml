name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Check format (ruff format --check)
        run: ruff format --check src/

      - name: Lint (ruff check)
        run: ruff check src/

  test:
    name: Test (3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run type checks
        run: mypy src/

      - name: Run tests
        run: pytest --cov=src --cov-report=xml



      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Verify package
        run: |
          pip install twine
          twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-exe:
    name: Build Windows Executable
    runs-on: windows-latest
    needs: [release]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Generate version file
        shell: powershell
        run: |
          $version = "${{ needs.release.outputs.version }}"
          $tuple = $version.Replace('.', ',') + ',0'
          $versionFile = @"
          VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=($tuple),
              prodvers=($tuple),
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0, 0)
            ),
            kids=[
              StringFileInfo(
                [
                  StringTable(
                    '040904B0',
                    [StringStruct('FileVersion', '$version'),
                     StringStruct('ProductVersion', '$version')])
                ]
              ),
              VarFileInfo([VarStruct('Translation', [1033, 1200])])
            ]
          )
          "@
          $versionFile | Out-File -FilePath version_info.txt -Encoding utf8

      - name: Build executable with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --name project-code-map \
            --version-file=version_info.txt \
            --collect-data tree_sitter_python \
            --collect-data tree_sitter_php \
            src/cli.py

      - name: Test executable
        run: |
          ./dist/project-code-map.exe --help
          ./dist/project-code-map.exe . --format json

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/project-code-map.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    timeout-minutes: 15
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install semantic-release
        run: |
          pip install python-semantic-release[twine]

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          semantic-release version --noop
          semantic-release publish

      - name: Get version
        id: get_version
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "version=$VERSION" >> $GITHUB_OUTPUT